<!DOCTYPE html>
<html>
<head>
<title>Pro Ludo</title>

<style>
body { text-align:center; font-family:Arial; }

.board {
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(15,20px);
  grid-template-rows:repeat(15,20px);
  margin:auto;
}

.cell {
  width:20px;
  height:20px;
  border:1px solid #ccc;
}

.red { background:red; }
.green { background:green; }
.blue { background:blue; }
.yellow { background:yellow; }

.token {
  width:12px;
  height:12px;
  border-radius:50%;
  margin:auto;
}

.t-red { background:red; }
.t-blue { background:blue; }

button {
  padding:10px 20px;
  margin-top:15px;
}
</style>
</head>

<body>

<h1>🎲 Pro Ludo Game</h1>

<h2 id="turn">Red Turn</h2>

<button onclick="rollDice()">Roll Dice</button>
<h3 id="dice"></h3>

<div class="board" id="board"></div>

<script>
let board = document.getElementById("board");

// create 15x15 board
for(let i=0;i<225;i++){
  let div=document.createElement("div");
  div.className="cell";

  // color zones
  if(i<45 && i%15<5) div.classList.add("red");
  if(i<45 && i%15>9) div.classList.add("green");
  if(i>179 && i%15<5) div.classList.add("blue");
  if(i>179 && i%15>9) div.classList.add("yellow");

  div.id="c"+i;
  board.appendChild(div);
}

// positions
let redPos=0;
let bluePos=0;
let turn="red";

function draw(){
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="");

  let r=document.createElement("div");
  r.className="token t-red";
  document.getElementById("c"+redPos).appendChild(r);

  let b=document.createElement("div");
  b.className="token t-blue";
  document.getElementById("c"+bluePos).appendChild(b);
}

draw();

function rollDice(){
  let d=Math.floor(Math.random()*6)+1;
  document.getElementById("dice").innerText="Dice: "+d;

  if(turn==="red"){
    redPos+=d;
    if(redPos>224) redPos=224;
    turn="blue";
    document.getElementById("turn").innerText="Blue Turn";
  } else {
    bluePos+=d;
    if(bluePos>224) bluePos=224;
    turn="red";
    document.getElementById("turn").innerText="Red Turn";
  }

  draw();

  if(redPos===224) alert("Red Wins!");
  if(bluePos===224) alert("Blue Wins!");
}
</script>

</body>
</html>
