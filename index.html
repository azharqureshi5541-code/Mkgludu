<!DOCTYPE html>
<html>
<head>
<title>Ludo King Lite</title>

<style>
body { text-align:center; font-family:Arial; background:#f0f0f0; }

.board {
  width:360px;
  display:grid;
  grid-template-columns:repeat(6,60px);
  margin:20px auto;
}

.cell {
  width:60px;
  height:60px;
  border:1px solid #999;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  background:white;
}

.redHome { background:#ffcccc; }
.blueHome { background:#cce5ff; }
.path { background:#ddd; }

.token {
  width:18px;
  height:18px;
  border-radius:50%;
  margin:2px;
  cursor:pointer;
}

.red { background:red; }
.blue { background:blue; }

button {
  padding:10px 20px;
  font-size:16px;
  background:black;
  color:white;
  border:none;
}

#dice { font-size:22px; margin:10px; }
</style>

</head>

<body>

<h1>👑 Ludo King Lite</h1>
<h2 id="turn">🔴 Red Turn</h2>

<button onclick="rollDice()">Roll Dice</button>
<div id="dice">🎲</div>

<div class="board" id="board"></div>

<script>

// simple path
let path = [
8,9,10,11,
17,23,29,
28,27,26,
20,14
];

// create board
let board = document.getElementById("board");

for(let i=0;i<36;i++){
  let div=document.createElement("div");
  div.className="cell";
  div.id="c"+i;

  if(path.includes(i)) div.classList.add("path");

  if(i<6) div.classList.add("redHome");
  if(i>=30) div.classList.add("blueHome");

  board.appendChild(div);
}

// players
let red = [-1,-1,-1,-1];
let blue = [-1,-1,-1,-1];

let turn="red";
let diceValue=0;

function draw(){
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="");

  // RED
  red.forEach((p,i)=>{
    let t=document.createElement("div");
    t.className="token red";
    t.onclick=()=>moveToken("red",i);

    if(p>=0){
      document.getElementById("c"+path[p]).appendChild(t);
    } else {
      document.getElementById("c0").appendChild(t);
    }
  });

  // BLUE
  blue.forEach((p,i)=>{
    let t=document.createElement("div");
    t.className="token blue";
    t.onclick=()=>moveToken("blue",i);

    if(p>=0){
      document.getElementById("c"+path[p]).appendChild(t);
    } else {
      document.getElementById("c35").appendChild(t);
    }
  });
}

function rollDice(){
  diceValue=Math.floor(Math.random()*6)+1;
  document.getElementById("dice").innerText="🎲 "+diceValue;
}

function moveToken(player,index){

  if(player!==turn || diceValue===0) return;

  let arr = player==="red"?red:blue;
  let enemy = player==="red"?blue:red;

  if(arr[index]===-1){
    if(diceValue===6){
      arr[index]=0;
    } else return;
  } else {
    arr[index]+=diceValue;

    if(arr[index]>=path.length-1){
      arr[index]=path.length-1;
      setTimeout(()=>alert(player+" Wins!"),200);
    }

    // kill
    enemy.forEach((e,i)=>{
      if(arr[index]===e){
        enemy[i]=-1;
      }
    });
  }

  if(diceValue !== 6){
    turn = turn==="red"?"blue":"red";
    updateTurn();
  }

  diceValue=0;
  draw();
}

function updateTurn(){
  document.getElementById("turn").innerText =
    turn==="red" ? "🔴 Red Turn" : "🔵 Blue Turn";
}

draw();

</script>

</body>
</html>
