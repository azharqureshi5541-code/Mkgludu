<!DOCTYPE html>
<html>
<head>
<title>Ultra Ludo King</title>

<style>
body { text-align:center; font-family:Arial; background:#eee; }

.board {
  width:450px;
  display:grid;
  grid-template-columns:repeat(15,30px);
  margin:20px auto;
}

.cell {
  width:30px;
  height:30px;
  border:1px solid #999;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

.redHome { background:#ffcccc; }
.blueHome { background:#cce5ff; }
.greenHome { background:#ccffcc; }
.yellowHome { background:#fff3cc; }

.path { background:#ddd; }

.token {
  width:10px;
  height:10px;
  border-radius:50%;
  margin:1px;
  cursor:pointer;
}

.red { background:red; }
.blue { background:blue; }
.green { background:green; }
.yellow { background:gold; }

button {
  padding:10px 20px;
  font-size:16px;
  background:black;
  color:white;
  border:none;
}

#dice { font-size:22px; margin:10px; }
</style>

</head>

<body>

<h1>👑 Ultra Ludo King</h1>
<h2 id="turn">🔴 Red Turn</h2>

<button onclick="rollDice()">Roll Dice</button>
<div id="dice">🎲</div>

<div class="board" id="board"></div>

<script>

// simple circular path (demo)
let path = [];
for(let i=0;i<60;i++) path.push(i);

// board
let board = document.getElementById("board");

for(let i=0;i<225;i++){
  let div=document.createElement("div");
  div.className="cell";
  div.id="c"+i;

  if(path.includes(i)) div.classList.add("path");

  // homes
  if(i<30) div.classList.add("redHome");
  if(i>=195) div.classList.add("blueHome");
  if(i%15<5 && i>150) div.classList.add("greenHome");
  if(i%15>9 && i<75) div.classList.add("yellowHome");

  board.appendChild(div);
}

// players
let players = {
  red: [-1,-1,-1,-1],
  blue: [-1,-1,-1,-1],
  green: [-1,-1,-1,-1],
  yellow: [-1,-1,-1,-1]
};

let turnList = ["red","blue","green","yellow"];
let turnIndex = 0;
let diceValue = 0;

function currentPlayer(){
  return turnList[turnIndex];
}

function draw(){
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="");

  for(let p in players){
    players[p].forEach((pos,i)=>{
      let t=document.createElement("div");
      t.className="token "+p;
      t.onclick=()=>moveToken(p,i);

      if(pos>=0){
        document.getElementById("c"+path[pos]).appendChild(t);
      } else {
        document.getElementById("c0").appendChild(t);
      }
    });
  }
}

function rollDice(){
  diceValue=Math.floor(Math.random()*6)+1;
  document.getElementById("dice").innerText="🎲 "+diceValue;
}

function moveToken(player,index){

  if(player!==currentPlayer() || diceValue===0) return;

  let arr = players[player];

  if(arr[index]===-1){
    if(diceValue===6){
      arr[index]=0;
    } else return;
  } else {
    arr[index]+=diceValue;

    if(arr[index]>=path.length-1){
      arr[index]=path.length-1;
      setTimeout(()=>alert(player+" Wins!"),200);
    }

    // kill others
    for(let p in players){
      if(p!==player){
        players[p].forEach((e,i)=>{
          if(arr[index]===e){
            players[p][i]=-1;
          }
        });
      }
    }
  }

  if(diceValue!==6){
    turnIndex = (turnIndex+1)%4;
  }

  diceValue=0;
  updateTurn();
  draw();
}

function updateTurn(){
  let p=currentPlayer();
  let emoji = {
    red:"🔴", blue:"🔵", green:"🟢", yellow:"🟡"
  };
  document.getElementById("turn").innerText =
    emoji[p]+" "+p.toUpperCase()+" Turn";
}

draw();

</script>

</body>
</html>
