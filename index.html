<!DOCTYPE html>
<html>
<head>
<title>Ludo Level 5</title>

<style>
body { text-align:center; font-family:Arial; background:#eee; }

.board {
  width:400px;
  display:grid;
  grid-template-columns:repeat(10,40px);
  margin:20px auto;
}

.cell {
  width:40px;
  height:40px;
  border:1px solid #999;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

.path { background:#ddd; }
.safe { background:#9ccc65; }

.token {
  width:12px;
  height:12px;
  border-radius:50%;
  margin:1px;
  cursor:pointer;
}

.red { background:red; }
.blue { background:blue; }
.green { background:green; }
.yellow { background:gold; }

button {
  padding:10px 20px;
  font-size:16px;
  background:black;
  color:white;
  border:none;
}

#dice { font-size:22px; margin:10px; }
</style>

</head>

<body>

<h1>🎲 Ludo Level 5</h1>
<h2 id="turn">🔴 Red Turn</h2>

<button onclick="rollDice()">Roll Dice</button>
<div id="dice">🎲</div>

<div class="board" id="board"></div>

<script>

// PATH
let path = [];
for(let i=0;i<40;i++) path.push(i);

// SAFE ZONES
let safeZones = [0,8,16,24,32];

// BOARD
let board = document.getElementById("board");

for(let i=0;i<100;i++){
  let div=document.createElement("div");
  div.className="cell";
  div.id="c"+i;

  if(path.includes(i)) div.classList.add("path");
  if(safeZones.includes(i)) div.classList.add("safe");

  board.appendChild(div);
}

// PLAYERS
let players = {
  red: [-1,-1,-1,-1],
  blue: [-1,-1,-1,-1],
  green: [-1,-1,-1,-1],
  yellow: [-1,-1,-1,-1]
};

let turnList = ["red","blue","green","yellow"];
let turnIndex = 0;
let dice = 0;

function currentPlayer(){
  return turnList[turnIndex];
}

function draw(){
  document.querySelectorAll(".cell").forEach(c=>c.innerHTML="");

  for(let p in players){
    players[p].forEach((pos,i)=>{
      let t=document.createElement("div");
      t.className="token "+p;
      t.onclick=()=>move(p,i);

      if(pos>=0){
        document.getElementById("c"+path[pos]).appendChild(t);
      } else {
        document.getElementById("c0").appendChild(t);
      }
    });
  }
}

function rollDice(){
  dice=Math.floor(Math.random()*6)+1;
  document.getElementById("dice").innerText="🎲 "+dice;
}

function move(player,i){

  if(player!==currentPlayer() || dice===0) return;

  let arr = players[player];

  if(arr[i]===-1){
    if(dice===6){
      arr[i]=0;
    } else return;
  }
  else{
    arr[i]+=dice;
    if(arr[i]>=path.length){
      arr[i]=path.length-1;
    }

    // KILL (only if not safe)
    for(let p in players){
      if(p!==player){
        players[p].forEach((e,j)=>{
          if(e===arr[i] && !safeZones.includes(path[arr[i]])){
            players[p][j]=-1;
          }
        });
      }
    }
  }

  if(dice!==6){
    turnIndex = (turnIndex+1)%4;
  }

  updateTurn();
  dice=0;
  draw();
}

function updateTurn(){
  let p=currentPlayer();
  let emoji = {red:"🔴",blue:"🔵",green:"🟢",yellow:"🟡"};
  document.getElementById("turn").innerText =
    emoji[p]+" "+p.toUpperCase()+" Turn";
}

draw();

</script>

</body>
</html>
